blueprint:
  name: SolarFlow 800 Pro – Battery and Night Mode Control
  homeassistant:
    min_version: 2023.1.0
  description: >
    Fully controls a SolarFlow 800 Pro via Home Assistant.
    Priority: PV → Home → Battery → Export.
    Night mode enforces zero export from battery when PV < threshold.
  domain: automation
  input:

    grid_power_sensor:
      name: Grid power sensor
      selector:
        entity:
          domain: sensor

    battery_soc_sensor:
      name: Battery SOC sensor (%)
      selector:
        entity:
          domain: sensor

    pv_power_sensor:
      name: PV power sensor
      selector:
        entity:
          domain: sensor

    inverter_limit_entity:
      name: Inverter power limit
      description: Number entity to limit SolarFlow power
      selector:
        entity:
          domain: number

    min_power:
      name: Minimum inverter power (W)
      default: 0
      selector:
        number:
          min: 0
          max: 800
          unit_of_measurement: W

    max_power:
      name: Maximum inverter power (W)
      default: 800
      selector:
        number:
          min: 0
          max: 800
          unit_of_measurement: W

    soc_high:
      name: SOC export active (%)
      default: 95
      selector:
        number:
          min: 50
          max: 100
          unit_of_measurement: "%"

    soc_low:
      name: SOC charge-priority return (%)
      default: 80
      selector:
        number:
          min: 0
          max: 95
          unit_of_measurement: "%"

    soc_min:
      name: SOC minimum battery (%)
      default: 20
      selector:
        number:
          min: 0
          max: 50
          unit_of_measurement: "%"

    tolerance:
      name: Grid power dead zone (W)
      default: 20
      selector:
        number:
          min: 0
          max: 200
          unit_of_measurement: W

    ramp_limit:
      name: Ramp limit (W per cycle)
      default: 150
      selector:
        number:
          min: 10
          max: 1000
          unit_of_measurement: W

    grid_bias:
      name: Grid bias (W)
      default: 10
      selector:
        number:
          min: -50
          max: 50
          unit_of_measurement: W

    pv_threshold_night:
      name: PV threshold for night mode (W)
      default: 15
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: W

    export_mode_helper:
      name: Export mode helper
      selector:
        entity:
          domain: input_boolean

mode: restart
max_exceeded: silent

trigger:
  - trigger: time_pattern
    seconds: "/5"

action:

  # Variables for this cycle
  - variables:
      grid_entity: !input grid_power_sensor
      pv_entity: !input pv_power_sensor
      soc_entity: !input battery_soc_sensor
      inverter_entity: !input inverter_limit_entity
      export_mode_helper_entity: !input export_mode_helper
      grid_bias_value: !input grid_bias
      ramp_limit_value: !input ramp_limit
      max_power_value: !input max_power
      min_power_value: !input min_power
      soc_high_value: !input soc_high
      soc_low_value: !input soc_low
      soc_min_value: !input soc_min
      tolerance_value: !input tolerance
      pv_threshold_night_value: !input pv_threshold_night
      grid_power: "{{ states(grid_entity) | float(0) }}"
      abs_grid_power: "{{ grid_power | abs }}"
      pv_power: "{{ states(pv_entity) | float(0) }}"
      soc: "{{ states(soc_entity) | float(0) }}"
      current_limit: "{{ states(inverter_entity) | float(0) }}"
      sensor_valid: >
        {{ states(grid_entity) not in ['unavailable', 'unknown', 'none']
           and states(soc_entity) not in ['unavailable', 'unknown', 'none']
           and states(pv_entity) not in ['unavailable', 'unknown', 'none'] }}
      delta: "{{ grid_power + grid_bias_value }}"
      adjusted_delta: >
        {% if delta > ramp_limit_value %}
          {{ ramp_limit_value }}
        {% elif delta < -ramp_limit_value %}
          {{ -ramp_limit_value }}
        {% else %}
          {{ delta }}
        {% endif %}
      new_limit_raw: "{{ current_limit + adjusted_delta }}"
      new_limit: >
        {% if new_limit_raw > max_power_value %}
          {{ max_power_value }}
        {% elif new_limit_raw < min_power_value %}
          {{ min_power_value }}
        {% else %}
          {{ new_limit_raw }}
        {% endif %}
      export_mode: >
        {% if soc >= soc_high_value %}
          {{ true }}
        {% elif soc <= soc_low_value %}
          {{ false }}
        {% else %}
          {{ states(export_mode_helper_entity) == 'on' }}
        {% endif %}

  - choose:
      # Sensor invalid → shut down safely
      - conditions:
          - condition: template
            value_template: "{{ not sensor_valid }}"
        sequence:
          - service: number.set_value
            target:
              entity_id: "{{ inverter_entity }}"
            data:
              value: "{{ min_power_value }}"

      # Absolute priority – protect battery
      - conditions:
          - condition: template
            value_template: "{{ soc <= soc_min_value }}"
        sequence:
          - service: number.set_value
            target:
              entity_id: "{{ inverter_entity }}"
            data:
              value: "{{ min_power_value }}"

      # Night mode: PV < threshold → discharge battery (zero export)
      - conditions:
          - condition: template
            value_template: "{{ pv_power < pv_threshold_night_value and soc > soc_min_value }}"
        sequence:
          - condition: template
            value_template: "{{ abs_grid_power > tolerance_value }}"
          - service: number.set_value
            target:
              entity_id: "{{ inverter_entity }}"
            data:
              value: "{{ new_limit | round(0) | int }}"

      # Export excess when battery full
      - conditions:
          - condition: template
            value_template: "{{ export_mode == true }}"
        sequence:
          - service: number.set_value
            target:
              entity_id: "{{ inverter_entity }}"
            data:
              value: "{{ max_power_value }}"

      # Charge priority PV → home → battery
      - conditions:
          - condition: template
            value_template: "{{ export_mode == false }}"
        sequence:
          - condition: template
            value_template: "{{ abs_grid_power > tolerance_value }}"
          - service: number.set_value
            target:
              entity_id: "{{ inverter_entity }}"
            data:
              value: "{{ new_limit | round(0) | int }}"

    default:
      - service: number.set_value
        target:
          entity_id: "{{ inverter_entity }}"
        data:
          value: "{{ min_power_value }}"      
  
  - service: >
      {{ 'input_boolean.turn_on' if export_mode == true else 'input_boolean.turn_off' }}
    target:
      entity_id: !input export_mode_helper